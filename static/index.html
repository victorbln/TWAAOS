<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestionar de sarcini</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .navbar { box-shadow: 0 2px 8px rgba(0,0,0,0.15); }
        .card { border: none; box-shadow: 0 2px 8px rgba(0,0,0,0.08); border-radius: 12px; }
        .card-body { padding: 1.5rem; }
        .task-card { transition: transform 0.15s ease, box-shadow 0.15s ease; }
        .task-card:hover { transform: translateY(-2px); box-shadow: 0 4px 16px rgba(0,0,0,0.12); }
        .badge { font-size: 0.75em; padding: 0.35em 0.65em; }
        .nav-link-custom { color: rgba(255,255,255,0.8); text-decoration: none; cursor: pointer;
            padding: 0.4rem 0.8rem; border-radius: 6px; transition: background 0.15s; }
        .nav-link-custom:hover { background: rgba(255,255,255,0.15); color: white; }
        .nav-link-custom.active { background: rgba(255,255,255,0.2); color: white; }
    </style>
</head>
<body>

<nav class="navbar navbar-dark bg-primary">
    <div class="container">
        <span class="navbar-brand fw-bold">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor"
                class="bi bi-check2-square me-2 mb-1" viewBox="0 0 16 16">
                <path d="M3 14.5A1.5 1.5 0 0 1 1.5 13V3A1.5 1.5 0 0 1 3 1.5h8a.5.5 0 0 1 0 1H3a.5.5 0 0 0-.5.5v10a.5.5 0 0 0 .5.5h10a.5.5 0 0 0 .5-.5V8a.5.5 0 0 1 1 0v5a1.5 1.5 0 0 1-1.5 1.5z"/>
                <path d="m8.354 10.354 7-7a.5.5 0 0 0-.708-.708L8 9.293 5.354 6.646a.5.5 0 1 0-.708.708l3 3a.5.5 0 0 0 .708 0"/>
            </svg>
            Gestionar de sarcini
        </span>
        <div class="d-flex align-items-center gap-3">
            <span class="nav-link-custom" id="nav-sarcini" onclick="navigheaza('sarcini')">Sarcini</span>
            <span class="nav-link-custom" id="nav-despre" onclick="navigheaza('despre')">Despre mine</span>
            <div id="info-utilizator" class="d-none align-items-center gap-2">
                <span id="email-utilizator" class="text-white small"></span>
                <button class="btn btn-outline-light btn-sm" onclick="deconecteaza()">Deconectare</button>
            </div>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div id="pagina-sarcini">

        <div id="sectiune-auth">
            <div class="row justify-content-center">
                <div class="col-md-5">

                    <div id="form-inregistrare" class="card">
                        <div class="card-body">
                            <h5 class="card-title mb-4">Inregistrare</h5>
                            <div id="eroare-inregistrare" class="alert alert-danger d-none"></div>
                            <div id="succes-inregistrare" class="alert alert-success d-none"></div>
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Email</label>
                                <input type="email" id="reg-email" class="form-control" placeholder="adresa@email.com">
                            </div>
                            <div class="mb-4">
                                <label class="form-label fw-semibold">Parola</label>
                                <input type="password" id="reg-parola" class="form-control" placeholder="Minim 8 caractere">
                            </div>
                            <button class="btn btn-primary w-100 py-2" onclick="inregistreaza()">Inregistreaza-te</button>
                            <p class="text-center mt-3 mb-0 text-muted">
                                Ai deja cont? <a href="#" onclick="comutaFormular(); return false;">Autentifica-te</a>
                            </p>
                        </div>
                    </div>

                    <div id="form-autentificare" class="card d-none">
                        <div class="card-body">
                            <h5 class="card-title mb-4">Autentificare</h5>
                            <div id="eroare-autentificare" class="alert alert-danger d-none"></div>
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Email</label>
                                <input type="email" id="auth-email" class="form-control" placeholder="adresa@email.com">
                            </div>
                            <div class="mb-4">
                                <label class="form-label fw-semibold">Parola</label>
                                <input type="password" id="auth-parola" class="form-control">
                            </div>
                            <button class="btn btn-primary w-100 py-2" onclick="autentifica()">Conecteaza-te</button>
                            <p class="text-center mt-3 mb-0 text-muted">
                                Nu ai cont? <a href="#" onclick="comutaFormular(); return false;">Inregistreaza-te</a>
                            </p>
                        </div>
                    </div>

                </div>
            </div>
        </div>

        <div id="sectiune-sarcini" class="d-none">

            <div class="card mb-4">
                <div class="card-body">
                    <h5 class="card-title mb-3">Adauga o sarcina noua</h5>
                    <div class="row g-3">
                        <div class="col-md-5">
                            <input type="text" id="sarcina-titlu" class="form-control" placeholder="Titlul sarcinii">
                        </div>
                        <div class="col-md-5">
                            <input type="text" id="sarcina-descriere" class="form-control" placeholder="Descriere (optional)">
                        </div>
                        <div class="col-md-2">
                            <button class="btn btn-success w-100" onclick="adaugaSarcina()">+ Adauga</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="d-flex justify-content-between align-items-center mb-3">
                <h5 class="mb-0">Sarcinile mele <span id="contor-sarcini" class="badge bg-primary ms-1"></span></h5>
                <div class="form-check mb-0">
                    <input class="form-check-input" type="checkbox" id="doar-nefinalizate" onchange="incarcaSarcini()">
                    <label class="form-check-label" for="doar-nefinalizate">Doar nefinalizate</label>
                </div>
            </div>

            <div id="lista-sarcini"></div>

        </div>
    </div>
</div>

<div id="pagina-despre" class="d-none" style="position:fixed; top:56px; left:0; right:0; bottom:0; z-index:100; display:flex; flex-direction:column;">
    <div style="background:#1e1e1e; color:#aaa; font-size:0.8rem; padding:6px 16px; display:flex; align-items:center; justify-content:center; gap:8px; border-bottom:1px solid #333;">
        <span style="color:#555;">&#127760;</span>
        Aceasta pagina este hostata pe
        <a href="https://victorbalan.com/" target="_blank" style="color:#4da6ff; text-decoration:none; font-weight:600;">victorbalan.com</a>
    </div>
    <iframe src="https://victorbalan.com/" style="flex:1; width:100%; border:none; display:block;"></iframe>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const API = "";
    let paginaCurenta = "sarcini";

    function navigheaza(pagina) {
        paginaCurenta = pagina;
        document.getElementById("pagina-sarcini").classList.toggle("d-none", pagina !== "sarcini");
        document.getElementById("pagina-despre").classList.toggle("d-none", pagina !== "despre");
        document.getElementById("nav-sarcini").classList.toggle("active", pagina === "sarcini");
        document.getElementById("nav-despre").classList.toggle("active", pagina === "despre");
    }

    function salveazaToken(token) { localStorage.setItem("token", token); }
    function obtineToken() { return localStorage.getItem("token"); }
    function deconecteaza() { localStorage.removeItem("token"); actualizeazaUI(); }

    function actualizeazaUI() {
        const token = obtineToken();
        if (token) {
            document.getElementById("sectiune-auth").classList.add("d-none");
            document.getElementById("sectiune-sarcini").classList.remove("d-none");
            document.getElementById("info-utilizator").classList.remove("d-none");
            document.getElementById("info-utilizator").classList.add("d-flex");
            try {
                const payload = JSON.parse(atob(token.split(".")[1]));
                document.getElementById("email-utilizator").textContent = payload.sub;
            } catch (e) {}
            incarcaSarcini();
        } else {
            document.getElementById("sectiune-auth").classList.remove("d-none");
            document.getElementById("sectiune-sarcini").classList.add("d-none");
            document.getElementById("info-utilizator").classList.add("d-none");
            document.getElementById("info-utilizator").classList.remove("d-flex");
        }
    }

    function comutaFormular() {
        document.getElementById("form-inregistrare").classList.toggle("d-none");
        document.getElementById("form-autentificare").classList.toggle("d-none");
    }

    async function inregistreaza() {
        ascundeEroare("eroare-inregistrare");
        ascundeEroare("succes-inregistrare");
        const email = document.getElementById("reg-email").value;
        const parola = document.getElementById("reg-parola").value;
        try {
            const raspuns = await fetch(`${API}/inregistrare`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ email, parola })
            });
            if (!raspuns.ok) {
                const eroare = await raspuns.json();
                afiseazaEroare("eroare-inregistrare", eroare.detail || "Eroare la inregistrare.");
                return;
            }
            afiseazaSucces("succes-inregistrare", "Cont creat! Te poti autentifica.");
            setTimeout(comutaFormular, 1500);
        } catch {
            afiseazaEroare("eroare-inregistrare", "Nu se poate contacta serverul.");
        }
    }

    async function autentifica() {
        ascundeEroare("eroare-autentificare");
        const email = document.getElementById("auth-email").value;
        const parola = document.getElementById("auth-parola").value;
        const dateFormular = new URLSearchParams();
        dateFormular.append("username", email);
        dateFormular.append("password", parola);
        try {
            const raspuns = await fetch(`${API}/autentificare`, {
                method: "POST",
                body: dateFormular
            });
            if (!raspuns.ok) {
                afiseazaEroare("eroare-autentificare", "Email sau parola incorecte.");
                return;
            }
            const date = await raspuns.json();
            salveazaToken(date.access_token);
            actualizeazaUI();
        } catch {
            afiseazaEroare("eroare-autentificare", "Nu se poate contacta serverul.");
        }
    }

    async function incarcaSarcini() {
        const token = obtineToken();
        const doarNefinalizate = document.getElementById("doar-nefinalizate")?.checked;
        const url = doarNefinalizate ? `${API}/sarcini?doar_nefinalizate=true` : `${API}/sarcini`;
        try {
            const raspuns = await fetch(url, {
                headers: { "Authorization": `Bearer ${token}` }
            });
            if (raspuns.status === 401) { deconecteaza(); return; }
            if (!raspuns.ok) return;
            const sarcini = await raspuns.json();
            randeazaSarcini(sarcini);
        } catch {
            document.getElementById("lista-sarcini").innerHTML =
                `<div class="alert alert-warning">Nu se poate contacta serverul.</div>`;
        }
    }

    function randeazaSarcini(sarcini) {
        const container = document.getElementById("lista-sarcini");
        const finalizate = sarcini.filter(s => s.finalizata).length;
        document.getElementById("contor-sarcini").textContent = `${sarcini.length} total / ${finalizate} finalizate`;

        if (sarcini.length === 0) {
            container.innerHTML = `
                <div class="text-center py-5 text-muted">
                    <div style="font-size:3rem;">&#9989;</div>
                    <p class="mt-2">Nicio sarcina. Adauga una mai sus!</p>
                </div>`;
            return;
        }
        container.innerHTML = sarcini.map(s => `
            <div class="card mb-2 task-card" id="card-${s.id}">
                <div class="card-body d-flex justify-content-between align-items-start">
                    <div class="flex-grow-1 me-3">
                        <h6 class="mb-1 ${s.finalizata ? 'text-decoration-line-through text-muted' : ''}">
                            ${escapeHtml(s.titlu)}
                            <span class="badge ${s.finalizata ? 'bg-success' : 'bg-warning text-dark'} ms-2">
                                ${s.finalizata ? 'Finalizata' : 'In progres'}
                            </span>
                        </h6>
                        ${s.descriere ? `<p class="text-muted small mb-0">${escapeHtml(s.descriere)}</p>` : ''}
                    </div>
                    <div class="d-flex gap-2 flex-shrink-0">
                        <button class="btn btn-sm btn-outline-primary"
                            onclick="editeazaSarcina(${s.id}, ${JSON.stringify(escapeHtml(s.titlu))}, ${JSON.stringify(escapeHtml(s.descriere || ''))})">
                            Editeaza
                        </button>
                        <button class="btn btn-sm ${s.finalizata ? 'btn-success' : 'btn-outline-success'}"
                            onclick="finalizeazaSarcina(${s.id})" ${s.finalizata ? 'disabled' : ''}>
                            ${s.finalizata ? 'Gata' : 'Finalizeaza'}
                        </button>
                        <button class="btn btn-sm btn-outline-danger" onclick="stergeSarcina(${s.id})">
                            Sterge
                        </button>
                    </div>
                </div>
            </div>
        `).join("");
    }

    async function adaugaSarcina() {
        const titlu = document.getElementById("sarcina-titlu").value.trim();
        if (!titlu) return;
        const token = obtineToken();
        try {
            const raspuns = await fetch(`${API}/sarcini`, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": `Bearer ${token}`
                },
                body: JSON.stringify({
                    titlu,
                    descriere: document.getElementById("sarcina-descriere").value.trim() || null
                })
            });
            if (raspuns.ok) {
                document.getElementById("sarcina-titlu").value = "";
                document.getElementById("sarcina-descriere").value = "";
                incarcaSarcini();
            }
        } catch {
            alert("Nu se poate contacta serverul.");
        }
    }

    function editeazaSarcina(id, titluCurent, descriereCurenta) {
        const card = document.getElementById(`card-${id}`);
        const cardBody = card.querySelector(".card-body");
        cardBody.className = "card-body d-flex justify-content-between align-items-start";
        cardBody.innerHTML = `
            <div class="flex-grow-1 me-3">
                <div class="mb-2">
                    <input type="text" id="edit-titlu-${id}" class="form-control form-control-sm" value="${titluCurent}">
                </div>
                <div>
                    <input type="text" id="edit-descriere-${id}" class="form-control form-control-sm"
                        placeholder="Descriere (optional)" value="${descriereCurenta}">
                </div>
            </div>
            <div class="d-flex gap-2 flex-shrink-0 align-items-start mt-1">
                <button class="btn btn-sm btn-primary" onclick="salveazaEditare(${id})">Salveaza</button>
                <button class="btn btn-sm btn-secondary" onclick="incarcaSarcini()">Anuleaza</button>
            </div>
        `;
    }

    async function salveazaEditare(id) {
        const titlu = document.getElementById(`edit-titlu-${id}`).value.trim();
        const descriere = document.getElementById(`edit-descriere-${id}`).value.trim();
        if (!titlu) return;
        const token = obtineToken();
        try {
            const raspuns = await fetch(`${API}/sarcini/${id}`, {
                method: "PUT",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": `Bearer ${token}`
                },
                body: JSON.stringify({ titlu, descriere: descriere || null })
            });
            if (raspuns.ok) incarcaSarcini();
        } catch {
            alert("Nu se poate contacta serverul.");
        }
    }

    async function finalizeazaSarcina(id) {
        const token = obtineToken();
        try {
            const raspuns = await fetch(`${API}/sarcini/${id}/finalizeaza`, {
                method: "PATCH",
                headers: { "Authorization": `Bearer ${token}` }
            });
            if (raspuns.ok) incarcaSarcini();
        } catch {
            alert("Nu se poate contacta serverul.");
        }
    }

    async function stergeSarcina(id) {
        if (!confirm("Esti sigur ca vrei sa stergi aceasta sarcina?")) return;
        const token = obtineToken();
        try {
            const raspuns = await fetch(`${API}/sarcini/${id}`, {
                method: "DELETE",
                headers: { "Authorization": `Bearer ${token}` }
            });
            if (raspuns.ok) incarcaSarcini();
        } catch {
            alert("Nu se poate contacta serverul.");
        }
    }

    function afiseazaEroare(elementId, mesaj) {
        const el = document.getElementById(elementId);
        el.textContent = mesaj;
        el.classList.remove("d-none");
    }

    function afiseazaSucces(elementId, mesaj) {
        const el = document.getElementById(elementId);
        el.textContent = mesaj;
        el.classList.remove("d-none");
    }

    function ascundeEroare(elementId) {
        document.getElementById(elementId).classList.add("d-none");
    }

    function escapeHtml(text) {
        const div = document.createElement("div");
        div.textContent = String(text);
        return div.innerHTML;
    }

    document.addEventListener("DOMContentLoaded", () => {
        navigheaza("sarcini");
        actualizeazaUI();
    });
</script>
</body>
</html>
